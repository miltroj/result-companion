version: 1.0

test_filter:
  include_tags: []
  exclude_tags: []
  include_passing: false

rendering:
  exclude_fields: [elapsed_time, lineno, owner, assign]

llm_config:
  question_prompt: |
    You analyze Robot Framework test failures. Input is hierarchical:
    suite → test → keywords → log messages.
    Lines: `Keyword: <name> - <status>`, messages as plain lines.

    PRIORITY:
    1. FAIL keywords or failing assertions first
    2. Preceding PASS keywords for setup issues
    3. Tracebacks, exceptions, assertion errors, timeouts
    4. Find FIRST failure, not symptoms

    RESPOND EXACTLY:

    **Flow**
    - [Keywords leading to failure. Max 5 bullets]

    **Root Cause**
    [First FAIL keyword in quotes. Error type. Why.
    Quote exact error message if available. Max 2-3 sentences]
    Confidence: HIGH/MEDIUM/LOW

    **Contributing Factors**
    [Earlier warnings/errors that may relate. CONFIRMED/SUSPECTED.
    Or "None"]

    **Other Errors**
    [Unrelated actionable errors. Or "None"]

    **Fix**
    - [Actionable fix. Max 1-2 bullets]

    NO PREAMBLE. NO REASONING. DIRECT ANSWER ONLY.

  chunking:
    chunk_analysis_prompt: |
      This is chunk {chunk_number}/{total_chunks} of a Robot Framework
      test (execution order). Extract failure-relevant info.

      OUTPUT FORMAT:
      PHASE: [SETUP/BODY/TEARDOWN/UNKNOWN]
      ERRORS: [exceptions, tracebacks, assertion failures - exact text]
      FAIL_KEYWORDS: [keyword names with status=FAIL, in order]
      SUSPECT_KEYWORDS: [PASS keywords with errors/exceptions in
      messages - NOT deprecation warnings alone]
      NOTES: [one line - anything relevant, or "none"]

      If NO errors, NO failures, NO suspect keywords: "CLEAN"

      {text}

    final_synthesis_prompt: |
      NO PREAMBLE. NO REASONING. DIRECT OUTPUT ONLY.

      Synthesize chunk summaries into final analysis.
      Chunks are in EXECUTION ORDER (Chunk 1 = first).
      Ignore CLEAN chunks. Deduplicate repeated errors.

      If only FAIL_KEYWORDS are in TEARDOWN, check whether
      BODY/SETUP errors explain the teardown failure.

      **Flow**
      - [Failure-path keywords from all chunks. Max 5 bullets]

      **Root Cause**
      [First FAIL_KEYWORD in execution order. If no FAIL_KEYWORD
      before identified failure, state explicitly. Quote exact
      error message. Max 2-3 sentences]
      Confidence: HIGH/MEDIUM/LOW

      **Contributing Factors**
      [Earlier errors/warnings that may have caused root failure.
      Mark CONFIRMED or SUSPECTED]

      **Other Errors**
      [Independently actionable errors. Or "None"]

      **Fix**
      - [Actionable fix. Max 1-2 bullets]

      {summary}

  prompt_template: |
    Question: {question}

    Answer the question based on the following context: {context}

  summary_prompt_template: |
      You are summarizing {test_count} failed Robot Framework test
      analyses for a CI triage report. Engineers use this to decide
      what to fix and in what order.

      NO PREAMBLE. DIRECT OUTPUT ONLY.

      **Run Health**
      [One sentence: X tests failed, severity assessment.
      If most share one root cause, state explicitly.]

      **Failure Categories**
      [Group by root cause pattern. For each group:]
      - <Category> ({count} tests): <One sentence>
        Affected: <test names, abbreviated if needed>
        Action: <who fixes this and how — one line>

      [Order by count descending. Max 5 groups.
      Unique failures go under "Other (N tests)"]

      **Top Actions**
      1. [Highest-impact fix — most tests]
      2. [Second priority]
      3. [Third if applicable]

      [Max 3. Specific and actionable. Not "investigate"
      but "fix X in Y because Z"]

      **Environment Issues**
      [Infra/environment problems across tests. Or "None"]

      {analyses}

llm_factory:
  # LiteLLM model format: provider/model-name
  model: "copilot_sdk/gpt-5-mini"

tokenizer:
  tokenizer: openai_tokenizer
  max_content_tokens: 50000

concurrency:
  test_case: 1
  chunk: 1
