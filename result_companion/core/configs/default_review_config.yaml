version: 1.0

review:
  model: "gpt-5-mini"
  timeout: 300
  mcp_server_url: "https://api.enterprise.githubcopilot.com/mcp/readonly"

  review_prompt: |
    You are a QA assistant. Robot Framework tests failed after
    PR #{pr_number} in {repo_name}.

    FAILURE SUMMARY (result-companion output):
    {failure_summary}

    Analyze the PR changes to identify which modifications caused
    the test failures. Output ONLY the review comment body in
    GitHub Markdown. Do NOT run any shell commands to post comments.

    Format:
    - `## 🔍 result-companion: Test Failure Analysis` heading
    - Bullet points per finding: **file**, **line**,
      **why it caused the failure**
    - `## 💡 Suggested Fix` section with concrete code or steps
